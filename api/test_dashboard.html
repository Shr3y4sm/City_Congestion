<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityFlow AI - Live Traffic Monitor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
      }

      .header p {
        font-size: 1.2em;
        opacity: 0.9;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        margin-bottom: 20px;
      }

      .control-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        color: #333;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1em;
        transition: border-color 0.3s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 15px;
        font-size: 1em;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-start {
        background: #10b981;
        color: white;
      }

      .btn-start:hover {
        background: #059669;
      }

      .btn-stop {
        background: #ef4444;
        color: white;
      }

      .btn-stop:hover {
        background: #dc2626;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        padding: 15px;
        background: #f3f4f6;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .status-item {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #9ca3af;
      }

      .status-dot.connected {
        background: #10b981;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .traffic-display {
        min-height: 400px;
      }

      .traffic-update {
        padding: 20px;
        border-left: 4px solid #667eea;
        background: #f9fafb;
        border-radius: 8px;
        margin-bottom: 15px;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .traffic-update.alert {
        border-left-color: #ef4444;
        background: #fee2e2;
      }

      .traffic-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .congestion-badge {
        padding: 8px 16px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.9em;
      }

      .congestion-LOW {
        background: #d1fae5;
        color: #065f46;
      }

      .congestion-MEDIUM {
        background: #fef3c7;
        color: #92400e;
      }

      .congestion-HIGH {
        background: #fee2e2;
        color: #991b1b;
      }

      .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }

      .metric {
        text-align: center;
        padding: 15px;
        background: white;
        border-radius: 8px;
      }

      .metric-value {
        font-size: 1.5em;
        font-weight: 700;
        color: #667eea;
      }

      .metric-label {
        font-size: 0.9em;
        color: #6b7280;
        margin-top: 5px;
      }

      .alert-banner {
        padding: 15px;
        background: #ef4444;
        color: white;
        border-radius: 8px;
        margin-bottom: 15px;
        font-weight: 600;
        text-align: center;
        animation: shake 0.5s;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
      }

      .empty-state svg {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🚦 CityFlow AI</h1>
        <p>Live Traffic Monitoring Dashboard</p>
      </div>

      <div class="card">
        <div class="control-panel">
          <div class="input-group">
            <label for="origin">Origin</label>
            <input
              type="text"
              id="origin"
              placeholder="e.g., Koramangala, Bangalore"
              value="Koramangala, Bangalore"
            />
          </div>
          <div class="input-group">
            <label for="destination">Destination</label>
            <input
              type="text"
              id="destination"
              placeholder="e.g., MG Road, Bangalore"
              value="MG Road, Bangalore"
            />
          </div>
        </div>

        <div class="button-group">
          <button class="btn-start" id="startBtn" onclick="startMonitoring()">
            Start Monitoring
          </button>
          <button
            class="btn-stop"
            id="stopBtn"
            onclick="stopMonitoring()"
            disabled
          >
            Stop Monitoring
          </button>
        </div>

        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot" id="wsStatus"></div>
            <span id="wsStatusText">Disconnected</span>
          </div>
          <div class="status-item">
            <span id="updateCount">0 updates received</span>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 20px">Live Traffic Updates</h2>
        <div class="traffic-display" id="trafficDisplay">
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              ></path>
            </svg>
            <p>Start monitoring to see live traffic updates</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let ws = null;
      let updateCount = 0;
      const API_BASE = "http://localhost:8000";
      const WS_URL = "ws://localhost:8000/ws/live-monitor";

      function updateStatus(connected, text) {
        const dot = document.getElementById("wsStatus");
        const statusText = document.getElementById("wsStatusText");

        if (connected) {
          dot.classList.add("connected");
          statusText.textContent = text || "Connected";
        } else {
          dot.classList.remove("connected");
          statusText.textContent = text || "Disconnected";
        }
      }

      async function startMonitoring() {
        const origin = document.getElementById("origin").value;
        const destination = document.getElementById("destination").value;

        if (!origin || !destination) {
          alert("Please enter both origin and destination");
          return;
        }

        try {
          // Start monitoring via REST API
          const response = await fetch(`${API_BASE}/start-monitoring`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ origin, destination }),
          });

          const result = await response.json();

          if (!response.ok) {
            alert(result.detail || "Failed to start monitoring");
            return;
          }

          console.log("Monitoring started:", result);

          // Connect WebSocket
          connectWebSocket();

          // Update UI
          document.getElementById("startBtn").disabled = true;
          document.getElementById("stopBtn").disabled = false;
          document.getElementById("origin").disabled = true;
          document.getElementById("destination").disabled = true;
        } catch (error) {
          console.error("Error starting monitoring:", error);
          alert(
            "Failed to connect to server. Make sure the service is running.",
          );
        }
      }

      async function stopMonitoring() {
        try {
          const response = await fetch(`${API_BASE}/stop-monitoring`, {
            method: "POST",
          });

          const result = await response.json();
          console.log("Monitoring stopped:", result);

          // Close WebSocket
          if (ws) {
            ws.close();
            ws = null;
          }

          // Update UI
          document.getElementById("startBtn").disabled = false;
          document.getElementById("stopBtn").disabled = true;
          document.getElementById("origin").disabled = false;
          document.getElementById("destination").disabled = false;
          updateStatus(false);
        } catch (error) {
          console.error("Error stopping monitoring:", error);
        }
      }

      function connectWebSocket() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          console.log("WebSocket connected");
          updateStatus(true);
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          console.log("Received:", data);

          // Skip connection messages
          if (data.type === "connection") {
            return;
          }

          // Display traffic update
          displayTrafficUpdate(data);

          // Update counter
          updateCount++;
          document.getElementById("updateCount").textContent =
            `${updateCount} update${updateCount !== 1 ? "s" : ""} received`;
        };

        ws.onerror = (error) => {
          console.error("WebSocket error:", error);
          updateStatus(false, "Connection error");
        };

        ws.onclose = () => {
          console.log("WebSocket closed");
          updateStatus(false);
        };
      }

      function displayTrafficUpdate(data) {
        const container = document.getElementById("trafficDisplay");

        // Clear empty state
        if (container.querySelector(".empty-state")) {
          container.innerHTML = "";
        }

        // Create update element
        const updateDiv = document.createElement("div");
        updateDiv.className = `traffic-update ${data.alert ? "alert" : ""}`;

        const timestamp = new Date(data.timestamp).toLocaleTimeString();

        updateDiv.innerHTML = `
                ${data.alert ? '<div class="alert-banner">⚠️ HIGH CONGESTION ALERT</div>' : ""}
                <div class="traffic-header">
                    <div>
                        <strong>${data.origin}</strong> → <strong>${data.destination}</strong>
                    </div>
                    <div>
                        <span class="congestion-badge congestion-${data.congestion_level}">
                            ${data.congestion_level}
                        </span>
                    </div>
                </div>
                <div class="metrics-grid">
                    <div class="metric">
                        <div class="metric-value">${data.distance_km}</div>
                        <div class="metric-label">km</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.duration_min}</div>
                        <div class="metric-label">minutes</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.congestion_index}</div>
                        <div class="metric-label">Congestion Index</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.risk_score}</div>
                        <div class="metric-label">Risk Score (0-10)</div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 10px; color: #9ca3af; font-size: 0.9em;">
                    ${timestamp}
                </div>
            `;

        // Add to top
        container.insertBefore(updateDiv, container.firstChild);

        // Keep only last 10 updates
        while (container.children.length > 10) {
          container.removeChild(container.lastChild);
        }
      }

      // Check server status on load
      window.addEventListener("load", async () => {
        try {
          const response = await fetch(`${API_BASE}/`);
          const data = await response.json();
          console.log("Server status:", data);
        } catch (error) {
          console.error("Server not reachable:", error);
          alert(
            "Warning: Cannot connect to server. Make sure the service is running at http://localhost:8000",
          );
        }
      });
    </script>
  </body>
</html>
